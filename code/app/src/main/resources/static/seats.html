<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Seats</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="navbar">
    <div class="nav-container">
      <div class="logo">✈ Go Fly</div>
      <nav>
        <a href="/home.html">Home</a>
        <a href="/search">Book a flight</a>
        <a href="/booking.html">My Bookings</a>
        <a href="/management.html">Management</a>
      </nav>
    </div>
  </header>

  <main class="seat-page container page">
    <div class="page-header">
      <div>
        <h1 class="page-title" id="pageTitle">Choose Your Seats</h1>
        <p class="page-subtitle" id="pageSubtitle">Pick the exact seats you want before payment.</p>
      </div>
      <a class="button-outline" id="backToFlights" href="/flights.html">Back to flights</a>
    </div>

    <section class="plane-card">
      <div class="plane-shell">
        <div class="plane-nose">Front</div>

        <div class="seat-legend">
          <span><i class="legend-box available"></i> Available</span>
          <span><i class="legend-box selected"></i> Selected</span>
          <span><i class="legend-box taken"></i> Unavailable</span>
        </div>

        <div class="cabin-header">
          <span></span>
          <span>A</span><span>B</span><span>C</span>
          <span class="aisle-label">aisle</span>
          <span>D</span><span>E</span><span>F</span>
        </div>
        <div id="seatMap" class="seat-cabin"></div>
      </div>

      <aside class="seat-summary-card">
        <h2 id="summaryTitle">Trip summary</h2>
        <p id="seatSummaryText">Loading seat map...</p>
        <div class="summary-chip-row">
          <span class="summary-chip">Flight <strong id="flightCodeChip">—</strong></span>
          <span class="summary-chip">Passengers <strong id="passengerChip">1</strong></span>
        </div>
        <button class="btn-find" id="continueBtn" type="button">Continue to Payment</button>
      </aside>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const qty = Number(params.get('qty') || '1');
    const returnFlightId = params.get('returnFlightId');
    const outboundSeats = params.get('seats'); // Check if outbound is already done
    
    // Determine if we are currently picking the outbound or the return
    const isPickingReturn = !!(returnFlightId && outboundSeats);
    const currentFlightId = isPickingReturn ? returnFlightId : (params.get('flightId') || '');

    // UI Updates for context
    if (isPickingReturn) {
      document.getElementById('pageTitle').textContent = "Choose Return Seats";
      document.getElementById('summaryTitle').textContent = "Return Trip Summary";
      document.getElementById('continueBtn').textContent = "Continue to Payment";
    } else if (returnFlightId) {
      document.getElementById('pageTitle').textContent = "Choose Outbound Seats";
      document.getElementById('continueBtn').textContent = "Next Flight Seats";
    }

    const selected = new Set(); 
    const seatMap = document.getElementById('seatMap');
    const seatSummaryText = document.getElementById('seatSummaryText');
    const continueBtn = document.getElementById('continueBtn');
    const backToFlights = document.getElementById('backToFlights');

    document.getElementById('passengerChip').textContent = String(qty);
    document.getElementById('flightCodeChip').textContent = currentFlightId || '—';
    backToFlights.href = '/flights.html?' + params.toString();

    const rows = 12;
    const leftSide = ['A', 'B', 'C'];
    const rightSide = ['D', 'E', 'F'];
    // Mock unavailable seats - in a real app, these would change per flightId
    const unavailable = new Set(['1A', '1F', '2C', '2D', '3B', '4E', '5A', '5F', '7C', '8D', '9B', '10E']);

    function makeSeat(row, letter) {
      const seatId = `${row}${letter}`;
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'plane-seat';
      button.innerHTML = `<span class="seat-letter">${letter}</span><span class="seat-number">${row}</span>`;
      button.dataset.seat = seatId;

      if (unavailable.has(seatId)) {
        button.classList.add('taken');
        button.disabled = true;
      }

      button.addEventListener('click', () => {
        if (!button.classList.contains('selected') && selected.size >= qty) {
          alert(`Please select only ${qty} seat${qty === 1 ? '' : 's'}.`);
          return;
        }
        button.classList.toggle('selected');
        if (button.classList.contains('selected')) selected.add(seatId);
        else selected.delete(seatId);
        updateSummary();
      });

      return button;
    }

    function drawCabin() {
      seatMap.innerHTML = '';
      for (let row = 1; row <= rows; row++) {
        const rowEl = document.createElement('div');
        rowEl.className = 'seat-row-aircraft';
        const number = document.createElement('div');
        number.className = 'row-number';
        number.textContent = row;
        rowEl.appendChild(number);
        leftSide.forEach(letter => rowEl.appendChild(makeSeat(row, letter)));
        const aisle = document.createElement('div');
        aisle.className = 'aisle-gap';
        rowEl.appendChild(aisle);
        rightSide.forEach(letter => rowEl.appendChild(makeSeat(row, letter)));
        seatMap.appendChild(rowEl);
      }
    }

    function updateSummary() {
      const seats = Array.from(selected).sort();
      seatSummaryText.innerHTML = `Choose <strong>${qty}</strong> seat(s). Selected: <strong>${seats.length ? seats.join(', ') : 'none yet'}</strong>.`;
      continueBtn.disabled = seats.length !== qty;
    }

    continueBtn.addEventListener('click', () => {
      const seatsString = Array.from(selected).sort().join(',');
      
      if (returnFlightId && !isPickingReturn) {
        // If we just finished outbound and there's a return, reload for the return flight
        params.set('seats', seatsString);
        window.location.href = 'seats.html?' + params.toString();
      } else {
        // If one-way or we just finished the return leg, go to payment
        if (isPickingReturn) {
          params.set('returnSeats', seatsString);
        } else {
          params.set('seats', seatsString);
        }
        window.location.href = '/payment.html?' + params.toString();
      }
    });

    drawCabin();
    updateSummary();
  </script>
</body>
</html>
