<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bookings</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="navbar">
    <div class="nav-container">
      <div class="logo">✈ Go Fly</div>
      <nav>
        <a href="/home.html">Home</a>
        <a href="/search">Book a flight</a>
        <a href="/booking.html" class="active">My Bookings</a>
        <a href="/management.html">Management</a>
      </nav>
    </div>
  </header>

  <main class="container page booking-page">
    <div class="page-header">
      <div>
        <h1 class="page-title">My Bookings</h1>
        <p class="page-subtitle">Only trips booked while signed in to your account appear here.</p>
      </div>
      <a class="button-outline" href="/search">Book another flight</a>
    </div>

    <div id="bookingNotice" class="booking-banner" hidden></div>
    <div id="bookingsContainer" class="booking-grid">
      <div class="booking-empty-card">Loading your bookings...</div>
    </div>
  </main>

  <script>
    async function ensureLoggedIn() {
      const response = await fetch('/current-user');
      const name = (await response.text()).trim();
      if (!name) {
        window.location.href = '/login.html';
        return false;
      }
      return true;
    }

    function formatDate(value) {
      if (!value) return '—';
      const date = new Date(value.replace(' ', 'T'));
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString();
    }

    async function loadBookings() {
      const container = document.getElementById('bookingsContainer');
      const notice = document.getElementById('bookingNotice');
      const params = new URLSearchParams(window.location.search);

      if (params.get('created') === '1') {
        notice.hidden = false;
        notice.textContent = 'Booking confirmed. You can now view it below.';
      }

      try {
        const response = await fetch('/api/my-bookings');
        if (response.status === 401) {
          window.location.href = '/login.html';
          return;
        }
        if (!response.ok) {
          throw new Error(await response.text());
        }
        const bookings = await response.json();

        if (!bookings.length) {
          container.innerHTML = `
            <div class="booking-empty-card">
              <h2>No bookings yet</h2>
              <p>Once you complete a flight purchase while signed in, it will appear here.</p>
              <a class="btn-find" href="/search">Find flights</a>
            </div>`;
          return;
        }

        container.innerHTML = bookings.map(b => `
          <article class="booking-card-live">
            <div class="booking-card-top">
              <div>
                <div class="booking-route">${b.from} <span>→</span> ${b.to}</div>
                <div class="booking-flight-meta">Flight ${b.flightNumber} · Booking #${b.id}</div>
              </div>
              <span class="booking-status ${String(b.status).toLowerCase()}">${b.status}</span>
            </div>

            <div class="booking-meta-grid">
              <div><span>Departure</span><strong>${formatDate(b.departureTime)}</strong></div>
              <div><span>Arrival</span><strong>${formatDate(b.arrivalTime)}</strong></div>
              <div><span>Booked on</span><strong>${formatDate(b.createdAt)}</strong></div>
              <div><span>Passengers</span><strong>${b.passengers}</strong></div>
              <div><span>Total</span><strong>$${Number(b.totalPrice).toFixed(2)}</strong></div>
            </div>
          </article>
        `).join('');
      } catch (error) {
        container.innerHTML = `<div class="booking-empty-card">Could not load your bookings: ${error.message}</div>`;
      }
    }

    (async () => {
      const ok = await ensureLoggedIn();
      if (ok) loadBookings();
    })();
  </script>
</body>
</html>
