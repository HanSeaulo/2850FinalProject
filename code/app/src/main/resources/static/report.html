<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Report - Go Fly</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav>
    <a href="/">Home</a>
    <a href="/booking.html">View Bookings</a>

    <span id="user-name" style="display:none;"></span>

    <form id="logout-form" action="/logout" method="post" style="display:none;">
      <button type="submit">Log Out</button>
    </form>

    <a href="/login" id="signin-link">Sign In</a>
    <a href="/management.html">Management</a>
  </nav>

  <main class="hero">
    <div class="search-wrapper">
      <h2>Report an Issue</h2>

      <form action="/report" method="post">

        <div class="input-row">
          <div>
            <label>Reference</label>
            <input type="text" name="bookingRef" placeholder="e.g. GF12345" required>
          </div>

          <div>
            <label>Issue Type</label>
            <select name="issueType" required>
              <option value="">Select one</option>
              <option>Booking</option>
              <option>Payment</option>
              <option>Account</option>
              <option>Other</option>
            </select>
          </div>
        </div>

        <div style="margin-bottom:20px;">
          <label style="display:block;margin-bottom:8px;">Description</label>
          <textarea
            name="details"
            rows="5"
            style="width:100%;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.95);color:#0f172a;"
            placeholder="Describe the issue here..."
            required
          ></textarea>
        </div>

        <div class="submit-area">
          <button class="btn-find" type="submit">Submit Report</button>
        </div>

      </form>
    </div>
  </main>
  <script>
async function updateAuthButton() {
  const authButton = document.querySelector(".nav a[href='/login.html'], .nav a[href='/login']");

  if (!authButton) return;

  const res = await fetch("/current-user");
  const name = await res.text();

  if (name.trim()) {
    authButton.textContent = name;
    authButton.href = "/logout";
  } else {
    authButton.textContent = "Sign In";
    authButton.href = "/login.html";
  }
}

updateAuthButton();
</script>
<script src="/auth.js"></script>
</body>
</html>
