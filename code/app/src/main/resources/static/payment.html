<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <div class="brand">
        <h1>Payment</h1>
        <p>Review your fare, selected seats, and complete your booking.</p>
      </div>

      <form class="auth-form" action="/payment" method="post">
        <!-- Hidden inputs for backend -->
        <input type="hidden" id="flight-id" name="flightId" />
        <input type="hidden" id="return-flight-id" name="returnFlightId" />
        <input type="hidden" id="selected-seats" name="selectedSeats" />
        <input type="hidden" id="return-seats" name="returnSeats" />

        <label for="selected-seats-display">Selected seats (Outbound / Return)</label>
        <input id="selected-seats-display" type="text" value="Loading..." readonly />

        <label for="passenger-count-display">Passengers</label>
        <input id="passenger-count-display" type="text" value="1" readonly />

        <label for="seat-price-display">Flights subtotal</label>
        <input id="seat-price-display" type="text" value="Loading..." readonly />

        <label for="luggage">Select luggage</label>
        <select id="luggage" name="luggage" required>
          <option value="none">No extra luggage ($0)</option>
          <option value="10kg">Small (10 kg) — $30</option>
          <option value="23kg">Big (23 kg) — $60</option>
        </select>

        <label for="luggage-price-display">Luggage price</label>
        <input id="luggage-price-display" type="text" value="$0.00" readonly />

        <label for="total-price-display">Total price</label>
        <input id="total-price-display" type="text" value="Loading..." readonly />

        <input type="hidden" id="seat-price" name="seatPrice" />
        <input type="hidden" id="luggage-price" name="luggagePrice" />
        <input type="hidden" id="total-price" name="totalPrice" />

        <label for="card-name">Cardholder Name</label>
        <input type="text" id="card-name" name="cardName" placeholder="Enter cardholder name" required />

        <label for="card-number">Card Number</label>
        <input type="text" id="card-number" name="cardNumber" placeholder="1234 5678 9012 3456" required />

        <label for="expiry-date">Expiry Date</label>
        <input type="text" id="expiry-date" name="expiryDate" placeholder="MM/YY" required />

        <label for="cvv">CVV</label>
        <input type="password" id="cvv" name="cvv" placeholder="123" required />

        <p class="payment-note">You must be signed in to complete the booking and save it to your account.</p>
        <button type="submit" class="primary">Pay Now</button>
      </form>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const flightId = params.get("flightId");
    const returnFlightId = params.get("returnFlightId");
    const passengerCount = Number(params.get("qty") || "1");
    
    const outboundSeats = params.get("seats") || "";
    const returnSeats = params.get("returnSeats") || "";

    // Elements
    const flightIdInput = document.getElementById("flight-id");
    const returnFlightIdInput = document.getElementById("return-flight-id");
    const selectedSeatsInput = document.getElementById("selected-seats");
    const returnSeatsInput = document.getElementById("return-seats");
    const selectedSeatsDisplay = document.getElementById("selected-seats-display");
    const passengerCountDisplay = document.getElementById("passenger-count-display");
    const seatPriceDisplay = document.getElementById("seat-price-display");
    const luggageSelect = document.getElementById("luggage");
    const luggagePriceDisplay = document.getElementById("luggage-price-display");
    const totalPriceDisplay = document.getElementById("total-price-display");

    const seatPriceHidden = document.getElementById("seat-price");
    const luggagePriceHidden = document.getElementById("luggage-price");
    const totalPriceHidden = document.getElementById("total-price");

    let seatPrice = 0;

    // Fill initial values
    flightIdInput.value = flightId || "";
    returnFlightIdInput.value = returnFlightId || "";
    selectedSeatsInput.value = outboundSeats;
    returnSeatsInput.value = returnSeats;
    
    passengerCountDisplay.value = passengerCount.toString();
    
    // Combined seat display
    let seatText = outboundSeats;
    if (returnSeats) seatText += " / " + returnSeats;
    selectedSeatsDisplay.value = seatText || "No seats selected";

    function getLuggagePrice(value) {
      if (value === "10kg") return 30;
      if (value === "23kg") return 60;
      return 0;
    }

    function updateTotal() {
      const luggagePrice = getLuggagePrice(luggageSelect.value);
      const total = seatPrice + luggagePrice;

      luggagePriceDisplay.value = `$${luggagePrice.toFixed(2)}`;
      totalPriceDisplay.value = `$${total.toFixed(2)}`;

      seatPriceHidden.value = seatPrice.toFixed(2);
      luggagePriceHidden.value = luggagePrice.toFixed(2);
      totalPriceHidden.value = total.toFixed(2);
    }

    // Helper to fetch price for a single flight
    async function getPrice(id) {
      if (!id) return 0;
      const response = await fetch(`/flight-price?flightId=${encodeURIComponent(id)}`);
      const data = await response.json();
      return Number(data.price) || 0;
    }

    // Load combined prices
    async function initPrices() {
      try {
        const price1 = await getPrice(flightId);
        const price2 = await getPrice(returnFlightId);
        
        // Total flight price is (Price1 + Price2) * passengers
        seatPrice = (price1 + price2) * passengerCount;
        
        seatPriceDisplay.value = `$${seatPrice.toFixed(2)}`;
        updateTotal();
      } catch (err) {
        seatPriceDisplay.value = "Price unavailable";
        totalPriceDisplay.value = "Price unavailable";
      }
    }

    if (flightId) {
      initPrices();
    } else {
      seatPriceDisplay.value = "No flight selected";
      totalPriceDisplay.value = "No flight selected";
    }

    luggageSelect.addEventListener("change", updateTotal);
  </script>
  <script>
async function updateAuthButton() {
  const authButton = document.querySelector(".nav a[href='/login.html'], .nav a[href='/login']");

  if (!authButton) return;

  const res = await fetch("/current-user");
  const name = await res.text();

  if (name.trim()) {
    authButton.textContent = name;
    authButton.href = "/logout";
  } else {
    authButton.textContent = "Sign In";
    authButton.href = "/login.html";
  }
}

updateAuthButton();
</script>
<script src="/auth.js"></script>
</body>
</html>
