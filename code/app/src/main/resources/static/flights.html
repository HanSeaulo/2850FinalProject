<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flights</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">✈ Go Fly</div>
      <div>
        <a href="/home.html">Home</a>
        <a href="/booking.html">View Bookings</a>
        <a href="/login">Sign In</a>
        <a href="/management.html">Management</a>
      </div>
    </div>
  </nav>

  <div class="container page">
    <h1 class="page-title">Available Flights</h1>
    <p class="page-subtitle">Confirm your flight, then choose seats before payment.</p>
    <div id="searchSummary" class="stat-card" style="display:none;"></div>
    <div id="flightsList"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function selectFlight(flightId) {
      const next = new URLSearchParams(window.location.search);
      next.set("flightId", flightId);
      window.location.href = "/seats.html?" + next.toString();
    }

    async function loadFlights() {
      const container = document.getElementById("flightsList");
      const summary = document.getElementById("searchSummary");
      const apiParams = new URLSearchParams(window.location.search);

      const from = params.get("from");
      const to = params.get("to");
      const qty = params.get("qty") || "1";

      if (from || to) {
        summary.style.display = "block";
        summary.textContent =
          `Showing flights ${from ? `from ${from}` : ""} ${to ? `to ${to}` : ""} for ${qty} passenger(s).`.trim();
      }

      container.innerHTML = `<div class="stat-card">Loading flights...</div>`;

      try {
        const response = await fetch("/api/flights?" + apiParams.toString());
        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || "Failed to load flights");
        }

        const flights = await response.json();

        if (!flights.length) {
          container.innerHTML = `<div class="stat-card">No flights matched your search.</div>`;
          return;
        }

        container.innerHTML = flights.map(f => `
          <div class="flight-result-card">
            <div class="flight-left">
              <div class="flight-route">
                <span>${escapeHtml(f.from)}</span>
                <span class="flight-route-icon"> → ✈ → </span>
                <span>${escapeHtml(f.to)}</span>
              </div>
              <div class="flight-number-small">Flight ${escapeHtml(f.flightNumber)}</div>
              <div class="flight-number-small"><strong>Departure:</strong> ${escapeHtml(f.departureTime.replace("T", " "))}</div>
              <div class="flight-number-small"><strong>Arrival:</strong> ${escapeHtml(f.arrivalTime.replace("T", " "))}</div>
              <div class="flight-number-small"><strong>Seats left:</strong> ${Number(f.availableSeats)}</div>
            </div>

            <div class="flight-right">
              <div class="flight-price-big">$${Number(f.price).toFixed(2)}</div>
              <button class="btn-find" onclick="selectFlight(${Number(f.id)})">Confirm Flight</button>
            </div>
          </div>
        `).join("");
      } catch (error) {
        console.error(error);
        container.innerHTML = `<div class="stat-card">Could not load flights: ${error.message}</div>`;
      }
    }

    loadFlights();
  </script>
</body>
</html>
