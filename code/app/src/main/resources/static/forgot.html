<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="stlye.css" />
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <div class="brand">
        <h1>Reset Password</h1>
      </div>

      <form class="auth-form" action="#" method="post">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />

        <button type="submit" class="primary">Send Reset Link</button>
      </form>

      <p class="footer-text">
        Back to
        <a class="link" href="login.html">Log in</a>
      </p>

    </div>
  </main>
  <script>
async function updateAuthButton() {
  const authButton = document.querySelector(".nav a[href='/login.html'], .nav a[href='/login']");

  if (!authButton) return;

  const res = await fetch("/current-user");
  const name = await res.text();

  if (name.trim()) {
    authButton.textContent = name;
    authButton.href = "/logout";
  } else {
    authButton.textContent = "Sign In";
    authButton.href = "/login.html";
  }
}

updateAuthButton();
</script>
<script src="/auth.js"></script>
</body>

</html>
